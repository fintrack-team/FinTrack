name: Release - Build, Scan, and Push Docker Images

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-scan:
    name: Build & Scan (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: api
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - image_name: web
            dockerfile: apps/web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=/api
          - image_name: bot
            dockerfile: apps/bot/Dockerfile
            build_args: ""
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR (push only)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.image_name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          load: ${{ github.event_name == 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.image_name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.image_name }}:${{ github.sha }}

      - name: Scan ${{ matrix.image_name }} image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.repo.outputs.name }}-${{ matrix.image_name }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.image_name)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image_name }}.sarif
          category: ${{ matrix.image_name }}

  deploy-bot:
    name: Deploy bot to VM
    needs: build-scan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Resolve bot image ref
        id: img
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-bot:latest" >> "$GITHUB_OUTPUT"

      - name: Pull new image and recreate container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: GHCR_USER,GHCR_TOKEN,IMAGE
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker logout ghcr.io
            docker rm -f fintrack-bot 2>/dev/null || true
            docker run -d \
              --name fintrack-bot \
              --restart unless-stopped \
              --env-file ~/bot.env \
              "$IMAGE"
            docker image prune -f
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.img.outputs.image }}
